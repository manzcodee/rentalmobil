<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Mobil</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    <div id="root"></div>

    <!-- Firebase Initialization -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
      import { getFirestore, collection, query, where, getDocs, addDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
      import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyC-TUwpcrprCkKdp4j9RSBJyr1oJnWi9uw",
        authDomain: "rental-mobil-7baf0.firebaseapp.com",
        projectId: "rental-mobil-7baf0",
        storageBucket: "rental-mobil-7baf0.firebasestorage.app",
        messagingSenderId: "105265771128",
        appId: "1:105265771128:web:5701c6a7b7fa027590f38d",
        measurementId: "G-XN5PV0F9K7"
      };

      const app = initializeApp(firebaseConfig);
      
      // Export to window so React can access them
      window.firebaseDB = getFirestore(app);
      window.firebaseStorage = getStorage(app);
      window.firebaseFns = { collection, query, where, getDocs, addDoc, doc, onSnapshot, ref, uploadBytes, getDownloadURL, serverTimestamp };
      
      window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const defaultCars = [
            { id: 'm1', name: 'Toyota Avanza', harga: 300000, imageUrl: 'https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?auto=format&fit=crop&w=600&q=80' },
            { id: 'm2', name: 'Toyota Innova Reborn', harga: 500000, imageUrl: 'https://images.unsplash.com/photo-1550355291-bbee04a92027?auto=format&fit=crop&w=600&q=80' },
            { id: 'm3', name: 'Honda Brio Satya', harga: 250000, imageUrl: 'https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&w=600&q=80' },
            { id: 'm4', name: 'Honda Jazz RS', harga: 350000, imageUrl: 'https://images.unsplash.com/photo-1609521263047-f8f205293f24?auto=format&fit=crop&w=600&q=80' },
            { id: 'm5', name: 'Mitsubishi Pajero Sport', harga: 800000, imageUrl: 'https://images.unsplash.com/photo-1519641471654-76ce0107ad1b?auto=format&fit=crop&w=600&q=80' },
            { id: 'm6', name: 'Toyota Fortuner VRZ', harga: 800000, imageUrl: 'https://images.unsplash.com/photo-1583121274602-3e2820c69888?auto=format&fit=crop&w=600&q=80' },
            { id: 'm7', name: 'Suzuki Ertiga', harga: 300000, imageUrl: 'https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=600&q=80' },
            { id: 'm8', name: 'Daihatsu Xenia', harga: 300000, imageUrl: 'https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&w=600&q=80' },
            { id: 'm9', name: 'Honda HR-V', harga: 450000, imageUrl: 'https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?auto=format&fit=crop&w=600&q=80' }
        ];

        function App() {
            const [cars, setCars] = useState(defaultCars);
            const [isOpen, setIsOpen] = useState(true);
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [selectedCar, setSelectedCar] = useState(null);
            const [loadingCars, setLoadingCars] = useState(true);
            const [showHistory, setShowHistory] = useState(false);

            // History & Notification states
            const [userWa, setUserWa] = useState(localStorage.getItem('userWa') || '');
            const [userBookings, setUserBookings] = useState([]);
            const [notifiedBookings, setNotifiedBookings] = useState(() => {
                const saved = localStorage.getItem('notifiedBookings');
                return saved ? JSON.parse(saved) : [];
            });

            // Form states
            const [name, setName] = useState("");
            const [wa, setWa] = useState("");
            const [startDate, setStartDate] = useState("");
            const [startTime, setStartTime] = useState("");
            const [endDate, setEndDate] = useState("");
            const [endTime, setEndTime] = useState("");
            const [ktpFile, setKtpFile] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                const init = () => setFirebaseReady(true);
                if (window.firebaseDB) init();
                else window.addEventListener('firebaseReady', init);
                return () => window.removeEventListener('firebaseReady', init);
            }, []);

            useEffect(() => {
                if (!firebaseReady) return;
                const { firebaseDB, firebaseFns } = window;
                
                // Real-time listener for app_settings/status
                const unsubStatus = firebaseFns.onSnapshot(firebaseFns.doc(firebaseDB, 'app_settings', 'status'), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setIsOpen(data.isOpen !== false && data.is_open !== false);
                    }
                });

                // Fetch cars with status 'ready'
                const fetchCars = async () => {
                    try {
                        const q = firebaseFns.query(firebaseFns.collection(firebaseDB, 'cars'), firebaseFns.where('status', '==', 'ready'));
                        const querySnapshot = await firebaseFns.getDocs(q);
                        const carsData = [];
                        querySnapshot.forEach((docSnap) => {
                            carsData.push({ id: docSnap.id, ...docSnap.data() });
                        });
                        if (carsData.length > 0) {
                            setCars(carsData);
                        }
                    } catch (err) {
                        console.error("Error fetching cars:", err);
                    } finally {
                        setLoadingCars(false);
                    }
                };
                fetchCars();

                return () => unsubStatus();
            }, [firebaseReady]);

            // Fetch user bookings for history and notifications
            useEffect(() => {
                if (!firebaseReady || !userWa) return;
                const { firebaseDB, firebaseFns } = window;
                const q = firebaseFns.query(
                    firebaseFns.collection(firebaseDB, 'bookings'),
                    firebaseFns.where('wa', '==', userWa)
                );
                const unsubBookings = firebaseFns.onSnapshot(q, (snapshot) => {
                    const bookings = [];
                    snapshot.forEach(docSnap => bookings.push({ id: docSnap.id, ...docSnap.data() }));
                    // Sort by newest first, handling Firestore Timestamp
                    bookings.sort((a, b) => {
                        const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt || 0);
                        const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt || 0);
                        return dateB - dateA;
                    });
                    setUserBookings(bookings);
                });
                return () => unsubBookings();
            }, [firebaseReady, userWa]);

            // Notification checker for expired bookings
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    userBookings.forEach(booking => {
                        if (booking.tanggalSelesai && booking.jamSelesai && !notifiedBookings.includes(booking.id)) {
                            const endDateTime = new Date(`${booking.tanggalSelesai}T${booking.jamSelesai}`);
                            if (now >= endDateTime) {
                                // Trigger notification
                                alert(`🔔 Notifikasi: Waktu sewa untuk mobil ${booking.mobil || booking.carName} telah selesai!`);
                                const updatedNotified = [...notifiedBookings, booking.id];
                                setNotifiedBookings(updatedNotified);
                                localStorage.setItem('notifiedBookings', JSON.stringify(updatedNotified));
                            }
                        }
                    });
                }, 5000); // Check every 5 seconds
                return () => clearInterval(interval);
            }, [userBookings, notifiedBookings]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const { firebaseDB, firebaseStorage, firebaseFns } = window;
                    let ktpUrl = "";
                    
                    // Upload KTP Photo to Storage if provided
                    if (ktpFile) {
                        const storageRef = firebaseFns.ref(firebaseStorage, `ktp/${Date.now()}_${ktpFile.name}`);
                        const snapshot = await firebaseFns.uploadBytes(storageRef, ktpFile);
                        ktpUrl = await firebaseFns.getDownloadURL(snapshot.ref);
                    }

                    // Save booking to Firestore (Using requested schema)
                    await firebaseFns.addDoc(firebaseFns.collection(firebaseDB, 'bookings'), {
                        nama: name,
                        mobil: selectedCar.name || selectedCar.merk || "Mobil",
                        status: 'pending',
                        createdAt: firebaseFns.serverTimestamp(),
                        // Additional helpful fields
                        carId: selectedCar.id,
                        wa: wa,
                        tanggalMulai: startDate,
                        jamMulai: startTime,
                        tanggalSelesai: endDate,
                        jamSelesai: endTime,
                        ktpUrl: ktpUrl
                    });

                    // Save WA to local storage for history tracking
                    localStorage.setItem('userWa', wa);
                    setUserWa(wa);

                    alert("Booking berhasil dikirim! Silakan tunggu konfirmasi kami.");
                    setSelectedCar(null);
                    setShowHistory(true);
                    
                    // Reset form
                    setName(""); setWa(""); setStartDate(""); setStartTime(""); setEndDate(""); setEndTime(""); setKtpFile(null);
                } catch (error) {
                    console.error("Error booking: ", error);
                    alert("Terjadi kesalahan saat booking.");
                }
                setIsSubmitting(false);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <nav className="bg-indigo-600 text-white shadow-lg sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16 items-center">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setSelectedCar(null); setShowHistory(false);}}>
                                    <i className="fa-solid fa-car text-2xl"></i>
                                    <span className="font-bold text-xl tracking-tight">RentalAuto</span>
                                </div>
                                <div>
                                    <button 
                                        onClick={() => {setShowHistory(true); setSelectedCar(null);}} 
                                        className="bg-indigo-700 hover:bg-indigo-800 px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2"
                                    >
                                        <i className="fa-solid fa-clock-rotate-left"></i> Riwayat Booking
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                        {/* Status Alert */}
                        {!isOpen && (
                            <div className="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-8 rounded shadow-sm" role="alert">
                                <div className="flex items-center">
                                    <i className="fa-solid fa-circle-exclamation text-xl mr-3"></i>
                                    <div>
                                        <p className="font-bold">Rental Sedang Tutup</p>
                                        <p className="text-sm">Mohon maaf, layanan pemesanan saat ini sedang tidak tersedia.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Content */}
                        {showHistory ? (
                            <div className="bg-white rounded-xl shadow-md p-6 md:p-8 max-w-4xl mx-auto border border-gray-100 animate-fade-in">
                                <div className="flex justify-between items-center mb-6 border-b pb-4">
                                    <h2 className="text-2xl font-bold text-gray-800"><i className="fa-solid fa-list-ul mr-2 text-indigo-600"></i>Riwayat Booking Anda</h2>
                                    <button onClick={() => setShowHistory(false)} className="text-gray-500 hover:text-indigo-600 transition-colors">
                                        <i className="fa-solid fa-times text-2xl"></i>
                                    </button>
                                </div>

                                {!userWa ? (
                                    <div className="text-center py-12">
                                        <i className="fa-brands fa-whatsapp text-5xl text-green-500 mb-4"></i>
                                        <p className="mb-4 text-gray-600">Masukkan nomor WhatsApp Anda untuk melihat riwayat booking.</p>
                                        <div className="flex justify-center max-w-sm mx-auto">
                                            <input 
                                                type="text" 
                                                id="waInputHistory" 
                                                className="border border-gray-300 p-3 rounded-l-lg w-full focus:ring-2 focus:ring-indigo-500 outline-none" 
                                                placeholder="Contoh: 08123456789" 
                                            />
                                            <button 
                                                onClick={() => {
                                                    const val = document.getElementById('waInputHistory').value;
                                                    if(val) {
                                                        setUserWa(val);
                                                        localStorage.setItem('userWa', val);
                                                    }
                                                }} 
                                                className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-r-lg font-medium transition"
                                            >
                                                Cek
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div>
                                        <div className="mb-6 flex justify-between items-center bg-gray-50 p-4 rounded-lg">
                                            <p className="text-gray-700">Menampilkan riwayat untuk: <strong className="text-indigo-600">{userWa}</strong></p>
                                            <button 
                                                onClick={() => {
                                                    setUserWa('');
                                                    localStorage.removeItem('userWa');
                                                    setUserBookings([]);
                                                }} 
                                                className="text-sm text-red-500 hover:text-red-700 font-medium underline"
                                            >
                                                Ganti Nomor
                                            </button>
                                        </div>
                                        
                                        {userBookings.length === 0 ? (
                                            <div className="text-center py-12 border-2 border-dashed border-gray-200 rounded-xl">
                                                <i className="fa-solid fa-folder-open text-4xl text-gray-300 mb-3"></i>
                                                <p className="text-gray-500">Belum ada riwayat booking untuk nomor ini.</p>
                                                <button onClick={() => setShowHistory(false)} className="mt-4 text-indigo-600 font-medium hover:underline">Mulai Booking Sekarang</button>
                                            </div>
                                        ) : (
                                            <div className="space-y-4">
                                                {userBookings.map(b => {
                                                    const isExpired = b.tanggalSelesai && b.jamSelesai && new Date() >= new Date(`${b.tanggalSelesai}T${b.jamSelesai}`);
                                                    const createdDateStr = b.createdAt?.toDate 
                                                        ? b.createdAt.toDate().toLocaleDateString('id-ID') 
                                                        : (b.createdAt ? new Date(b.createdAt).toLocaleDateString('id-ID') : '-');
                                                    
                                                    return (
                                                        <div key={b.id} className="border border-gray-200 p-5 rounded-xl hover:shadow-md transition bg-white flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                                                            <div>
                                                                <h3 className="font-bold text-lg text-gray-800">{b.mobil || b.carName || "Mobil"}</h3>
                                                                <p className="text-sm text-gray-500 mt-1">
                                                                    <i className="fa-regular fa-calendar mr-2"></i>
                                                                    {b.tanggalMulai} {b.jamMulai} &nbsp;<i className="fa-solid fa-arrow-right text-xs"></i>&nbsp; {b.tanggalSelesai} {b.jamSelesai}
                                                                </p>
                                                                {isExpired && (
                                                                    <p className="text-xs text-red-500 mt-2 font-medium"><i className="fa-solid fa-stopwatch mr-1"></i> Waktu Sewa Habis</p>
                                                                )}
                                                            </div>
                                                            <div className="flex flex-col items-start sm:items-end gap-2">
                                                                <span className={`text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide ${b.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : b.status === 'approved' ? 'bg-green-100 text-green-700' : b.status === 'rejected' ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-700'}`}>
                                                                    {b.status || 'pending'}
                                                                </span>
                                                                <span className="text-xs text-gray-400">Dibuat: {createdDateStr}</span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        ) : selectedCar && isOpen ? (
                            <div className="bg-white rounded-xl shadow-md overflow-hidden p-6 md:p-8 max-w-3xl mx-auto border border-gray-100 animate-fade-in">
                                <button onClick={() => setSelectedCar(null)} className="text-indigo-600 hover:text-indigo-800 mb-6 flex items-center text-sm font-medium transition-colors">
                                    <i className="fa-solid fa-arrow-left mr-2"></i> Kembali ke Daftar Mobil
                                </button>
                                
                                <div className="flex items-center mb-6 border-b pb-4">
                                    <div className="w-16 h-16 bg-gray-100 rounded-lg overflow-hidden mr-4 flex-shrink-0">
                                        {selectedCar.imageUrl || selectedCar.image ? (
                                            <img src={selectedCar.imageUrl || selectedCar.image} alt="Car" className="w-full h-full object-cover" />
                                        ) : (
                                            <div className="w-full h-full flex items-center justify-center text-gray-400"><i className="fa-solid fa-car text-2xl"></i></div>
                                        )}
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-bold text-gray-800">Booking: {selectedCar.name || selectedCar.merk || "Mobil"}</h2>
                                        {selectedCar.harga && <p className="text-indigo-600 font-semibold">Rp {parseInt(selectedCar.harga).toLocaleString('id-ID')} / hari</p>}
                                    </div>
                                </div>
                                
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Nama Penyewa</label>
                                            <input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="Masukkan nama lengkap" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Nomor WhatsApp</label>
                                            <input type="tel" required value={wa} onChange={e => setWa(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="08123456789" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Tanggal Mulai</label>
                                            <input type="date" required value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Jam Mulai</label>
                                            <input type="time" required value={startTime} onChange={e => setStartTime(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Tanggal Selesai</label>
                                            <input type="date" required value={endDate} onChange={e => setEndDate(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Jam Selesai</label>
                                            <input type="time" required value={endTime} onChange={e => setEndTime(e.target.value)} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" />
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Upload Foto KTP</label>
                                        <input type="file" accept="image/*" required onChange={e => setKtpFile(e.target.files[0])} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100" />
                                    </div>

                                    <div className="pt-4">
                                        <button type="submit" disabled={isSubmitting} className={`w-full py-3 px-4 text-white font-bold rounded-lg shadow-md transition-all ${isSubmitting ? 'bg-indigo-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 hover:shadow-lg'}`}>
                                            {isSubmitting ? (
                                                <><i className="fa-solid fa-spinner fa-spin mr-2"></i> Memproses...</>
                                            ) : (
                                                'Sewa / Booking Sekarang'
                                            )}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        ) : (
                            <div>
                                <div className="text-center mb-10">
                                    <h1 className="text-3xl md:text-4xl font-extrabold text-gray-900 mb-4">Pilih Mobil Impian Anda</h1>
                                    <p className="text-lg text-gray-600">Armada terbaik dengan kondisi prima siap menemani perjalanan Anda.</p>
                                </div>

                                {loadingCars ? (
                                    <div className="flex justify-center items-center py-20">
                                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                                    </div>
                                ) : cars.length === 0 ? (
                                    <div className="text-center py-12 bg-white rounded-xl shadow-sm border border-gray-100">
                                        <i className="fa-solid fa-car-side text-4xl text-gray-300 mb-4"></i>
                                        <p className="text-gray-500">Belum ada mobil yang tersedia saat ini.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                        {cars.map(car => (
                                            <div key={car.id} className="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden border border-gray-100 flex flex-col">
                                                <div className="h-48 bg-gray-200 relative">
                                                    {car.imageUrl || car.image ? (
                                                        <img src={car.imageUrl || car.image} alt={car.name || car.merk} className="w-full h-full object-cover" />
                                                    ) : (
                                                        <div className="w-full h-full flex items-center justify-center text-gray-400 bg-gray-100">
                                                            <i className="fa-solid fa-image text-3xl"></i>
                                                        </div>
                                                    )}
                                                    <div className="absolute top-4 right-4 bg-green-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow">
                                                        Tersedia
                                                    </div>
                                                </div>
                                                <div className="p-6 flex-grow flex flex-col justify-between">
                                                    <div>
                                                        <h3 className="text-xl font-bold text-gray-800 mb-2">{car.name || car.merk || "Mobil"}</h3>
                                                        {car.harga && <p className="text-indigo-600 font-semibold mb-4">Rp {parseInt(car.harga).toLocaleString('id-ID')} / hari</p>}
                                                    </div>
                                                    {isOpen && (
                                                        <button onClick={() => setSelectedCar(car)} className="w-full mt-4 bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white font-semibold py-2 px-4 rounded-lg transition-colors border border-indigo-100 hover:border-indigo-600">
                                                            Pilih Mobil
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-gray-400 py-6 text-center text-sm mt-auto">
                        <p>&copy; {new Date().getFullYear()} RentalAuto. All rights reserved.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
